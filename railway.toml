# Railway deployment configuration for نبض (Nabd) Frontend
# See: https://railway.app/docs/deploy/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway provides PORT automatically — the app reads it from env
# Health check to confirm the service is ready
healthcheckPath = "/api"
healthcheckTimeout = 300
# Restart on failure
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
